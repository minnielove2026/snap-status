name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run test:collector
      - run: npm run check
      - run: npm run build
      - run: npm audit --audit-level=high
